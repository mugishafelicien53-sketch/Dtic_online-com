<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTIC Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

.container{
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#0066cc;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#0066cc;
    color:white;
    border:none;
}
</style>

</head>
<body>

<div class="container">
    <h2>DTIC Login</h2>

    <form>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account?
    <a href="register.html">Register</a></p>
</div>

</body><form action="dashboard.html">
</html>
